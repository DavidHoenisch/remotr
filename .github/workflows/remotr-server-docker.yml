name: remotr-server Docker

on:
  push:
    branches:
      - master
      - main
    tags:
      - "v*"
    paths:
      - .github/workflows/remotr-server-docker.yml
      - docker/remotr-server/**
      - deploy/fly/config-repo/**
      - cmd/remotr-server/**
      - internal/**
      - go.mod
      - go.sum
      - vendor/**
  pull_request:
    paths:
      - .github/workflows/remotr-server-docker.yml
      - docker/remotr-server/**
      - deploy/fly/config-repo/**
      - cmd/remotr-server/**
      - internal/**
      - go.mod
      - go.sum
      - vendor/**
  workflow_dispatch:

env:
  REGISTRY: docker.io
  IMAGE_NAME: remotr-server

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Authenticate before buildx boot so pulling moby/buildkit is less likely to
      # hit Docker Hub anonymous rate limits / timeouts.
      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v3
        continue-on-error: true

      - name: Retry Set up Docker Buildx
        if: steps.buildx.outcome == 'failure'
        uses: docker/setup-buildx-action@v3

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/remotr-server/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
