services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: remotr
      POSTGRES_PASSWORD: remotr
      POSTGRES_DB: remotr
    volumes:
      - ../sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U remotr -d remotr"]
      interval: 2s
      timeout: 3s
      retries: 15

  certs:
    image: alpine:3.20
    volumes:
      - ./runtime/certs:/certs
      - ./scripts/gen-certs.sh:/scripts/gen-certs.sh:ro
    entrypoint: ["/bin/sh", "-c", "apk add --no-cache openssl >/dev/null && /scripts/gen-certs.sh"]

  migrate:
    image: postgres:16-alpine
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../sql/schema.sql:/schema.sql:ro
      - ./runtime:/runtime
      - ./scripts/seed-compose-registry.sh:/scripts/seed-compose-registry.sh:ro
    environment:
      PGPASSWORD: remotr
    entrypoint:
      [
        "/bin/sh",
        "-c",
        "psql -h postgres -U remotr -d remotr -v ON_ERROR_STOP=1 -f /schema.sql && /scripts/seed-compose-registry.sh",
      ]

  remotr-server:
    build:
      context: ..
      dockerfile: docker/remotr-server/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      certs:
        condition: service_completed_successfully
    environment:
      REMOTR_LISTEN: ":8443"
      REMOTR_TLS_CERT: /certs/server.crt
      REMOTR_TLS_KEY: /certs/server.key
      REMOTR_TLS_CLIENT_CA: /certs/ca.crt
      REMOTR_CA_CERT: /certs/ca.crt
      REMOTR_CA_KEY: /certs/ca.key
      REMOTR_DATABASE_URL: postgres://remotr:remotr@postgres:5432/remotr?sslmode=disable
      REMOTR_CONFIG_REPO: /config-repo
      REMOTR_RELEASE_REF: e2e-dev
      REMOTR_BOOTSTRAP_FILE: /var/lib/remotr/bootstrap.token
    volumes:
      - ./config-repo:/config-repo:ro
      - ./runtime/certs:/certs:ro
      - ./runtime:/var/lib/remotr
    ports:
      - "8443:8443"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "--no-check-certificate", "https://127.0.0.1:8443/healthz"]
      interval: 3s
      timeout: 3s
      retries: 10

  agent-debian:
    build:
      context: ..
      dockerfile: compose/Dockerfile.agent
      args:
        BASE_IMAGE: debian:bookworm-slim
    depends_on:
      remotr-server:
        condition: service_healthy
      certs:
        condition: service_completed_successfully
      migrate:
        condition: service_completed_successfully
    environment:
      REMOTR_SERVER_URL: https://remotr-server:8443
      REMOTR_TLS_CA: /certs/ca.crt
      REMOTR_STATE_DIR: /var/lib/remotr
      REMOTR_ENROLL_TOKEN_FILE: /run/secrets/enroll-token
      REMOTR_SYNC_INTERVAL: 10s
      REMOTR_COMPOSE_E2E: "1"
    volumes:
      - ./runtime/certs:/certs:ro
      - ./runtime/agent-debian:/var/lib/remotr
      - ./runtime/enroll-tokens/debian.token:/run/secrets/enroll-token:ro
    healthcheck:
      test: ["CMD", "test", "-f", "/var/lib/remotr/state.json"]
      interval: 2s
      timeout: 2s
      retries: 30
      start_period: 15s

  agent-arch:
    build:
      context: ..
      dockerfile: compose/Dockerfile.agent
      args:
        BASE_IMAGE: archlinux:latest
    depends_on:
      remotr-server:
        condition: service_healthy
      certs:
        condition: service_completed_successfully
      migrate:
        condition: service_completed_successfully
    environment:
      REMOTR_SERVER_URL: https://remotr-server:8443
      REMOTR_TLS_CA: /certs/ca.crt
      REMOTR_STATE_DIR: /var/lib/remotr
      REMOTR_ENROLL_TOKEN_FILE: /run/secrets/enroll-token
      REMOTR_SYNC_INTERVAL: 10s
      REMOTR_COMPOSE_E2E: "1"
    volumes:
      - ./runtime/certs:/certs:ro
      - ./runtime/agent-arch:/var/lib/remotr
      - ./runtime/enroll-tokens/arch.token:/run/secrets/enroll-token:ro
    healthcheck:
      test: ["CMD", "test", "-f", "/var/lib/remotr/state.json"]
      interval: 2s
      timeout: 2s
      retries: 30
      start_period: 15s
