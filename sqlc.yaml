# sqlc config for Remotr server registry.
#
# Generate (requires sqlc on PATH, e.g. go install github.com/sqlc-dev/sqlc/cmd/sqlc@latest):
#   sqlc generate
#
# After adding Go deps from generated code:
#   go mod tidy && go mod vendor
#
# Apply schema to local compose Postgres:
#   make migrate-compose
# Apply schema to production Postgres (Neon):
#   REMOTR_DATABASE_URL='postgres://...' make migrate
#   REMOTR_NEON_PROJECT=my-app make migrate
#
version: "2"
sql:
  - engine: postgresql
    queries: sql/queries
    schema: sql/schema.sql
    gen:
      go:
        package: db
        out: internal/store/postgres/db
        sql_package: pgx/v5
        emit_empty_slices: true
        emit_json_tags: false
