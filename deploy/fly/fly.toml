# Generated by deploy/fly/bootstrap.sh — defaults for Fly + Neon bootstrap.
# Re-run bootstrap or edit manually, then: fly deploy --config deploy/fly/fly.toml

app = "remotr-example"
primary_region = "iad"

# Image deploy only — bootstrap uses docker.io/${REMOTR_DOCKER_USER}/remotr-server:latest
# (no local build; see deploy/fly/bootstrap.sh)

[env]
  REMOTR_LISTEN = ":8443"
  REMOTR_CONFIG_REPO = "/config-repo"
  REMOTR_RELEASE_REF = "fly-bootstrap"
  REMOTR_BOOTSTRAP_FILE = "/var/lib/remotr/bootstrap.token"
  REMOTR_GIT_SYNC_POLL_INTERVAL = "15m"

[mounts]
  source = "remotr_data"
  destination = "/var/lib/remotr"

# TCP passthrough: remotr-server terminates TLS and verifies agent mTLS client certs.
[[services]]
  protocol = "tcp"
  internal_port = 8443
  processes = ["app"]

  [[services.ports]]
    port = 443

  [[services.ports]]
    port = 8443

  [[services.tcp_checks]]
    interval = "15s"
    timeout = "2s"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
